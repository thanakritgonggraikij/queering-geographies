    <script>
        var esriConfig = {
            apiKey: "AAPTafZVDkX6_Z1tCNzB5lj8VKg..aclEKbU9vTZoFuwTW-ydH1KBfkUddg01SCSVoOEWt6__2IthEfsrdBCxeo7S9S7y5frVbvf57Jfl2s66qPXsveIwzLE-Kr61_cmJu_tH1sXtvIQfjs3Lx1klnn5zYea9nNcaGN4nQL24J4bEnOhLc02grhsTjch8JDTWLFEVUpIgOn6CR0IbDlc_VeBDiVd2yeA7QtXc5jw5osTc4lTbybvq7GwLb2_yw5i7KNHouWLpmymzBNNt9XDj3g1J7FY0mlmsX-Xa71yEYAAINu262gWydPpsSyy54UGRsHUeuL5jAT1_0FeWPM5G",
        };
    </script>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #titleDiv {
            font-weight: 400;
            font-style: normal;
            font-size: 1.2019rem;
            padding: 10px;
            background: var(--calcite-color-foreground-1);
        }

            display: flex;
            flex-direction: row;

        #sliderValue {

        #sliderInnerContainer {
            justify-content: center;

</head>

<body class="calcite-mode-dark">
    <calcite-shell id="appShell">
        <arcgis-map center="-73.6696807, 45.548185" zoom="10" resize-align="top-left">
            <div slot="top-left" id="titleDiv"> Gay(Queer) Commercial Activities in Montreal 1984 to 2025 </div> <!--! HELLO GRIS 45.548185,-73.6696807 -->
            <arcgis-home slot="top-left"></arcgis-home>
            <arcgis-fullscreen slot="top-right"></arcgis-fullscreen>
            <arcgis-expand slot="bottom-left" expand-icon="list-bullet">
                <arcgis-legend legend-style="classic"></arcgis-legend>
            </arcgis-expand>
        </arcgis-map>
        <div id="footer" slot="footer">
            <calcite-block id="years-block" expanded label="current year">
                <span id="sliderValue">1984</span>
            </calcite-block>
            <calcite-block id="slider-block" label="slider block" expanded>
                <div id="sliderInnerContainer">
                    <calcite-slider id="yearsSlider" value="1984" label-ticks ticks="5" max-label="2025" max="2025"
                        min-label="1984" min="1984"></calcite-slider>
                </div>
            </calcite-block>
            <calcite-block label="play button block" id="play-block" expanded>
                <calcite-button id="playButton" appearance="transparent" icon-start="play">Play</calcite-button>
            </calcite-block>
        </div>
    </calcite-shell>


    <script type="module">
        // Consolidate imports up front and freeze constants
        const [Map, FeatureLayer, promiseUtils] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/layers/FeatureLayer.js",
            "@arcgis/core/core/promiseUtils.js",
        ]);

        const sliderValue = document.getElementById("sliderValue");
        const playButton = document.getElementById("playButton");
        const slider = document.getElementById("yearsSlider");
        const viewElement = document.querySelector("arcgis-map");

        let animation = null;

        //--------------------------------------------------------------------------
        //  
        //--------------------------------------------------------------------------
        // NEW GLOBAL VARIABLES
        const HOSTEDLAYERID = "91c12901c8b04f438905babf56aaf7e9"
        const BASEMAPID = "4f2e99ba65e34bb8af49733d9778fb8e"
        const YEAR_FIELD = "YEAR_NUM"; // FIELD NAME 
        //--------------------------------------------------------------------------
        //  
        //--------------------------------------------------------------------------

        // Setup map and layer
        const layer = new FeatureLayer({
            portalItem: { id: HOSTEDLAYERID },  //PORTAL ITEM... THIS IS WHERE THE DATA COMES FROM -- TEST fb964b99e4c34c61896eced66e902710, OLD DATA = dfe2d606134546f5a712e689d76540ac
            definitionExpression: `${YEAR_FIELD} > 0`, //%%%%%%%%%%%%%
            title: "Gay(Queer) Spaces",
            // minScale: 72223.819286,
            effect: "bloom(2.5 0 0.5)",
        });

        viewElement.map = new Map({
            basemap: {
                portalItem: {
                    id: BASEMAPID,  //CUSTOM BASEMAP
                },
            },
            layers: [layer],
        });
        
        viewElement.constraints = {
            snapToZoom: false,
            // minScale: 100000.819286,
        };

        const fullsceenElement = document.querySelector("arcgis-fullscreen");
        fullsceenElement.element = document.getElementById("appShell");

        // When user drags the slider:
        //  - stops the animation
        //  - set the visualized year to the slider one.
        slider.addEventListener("calciteSliderInput", (e) => {
            stopAnimation();
            setYear(e.target.value);
        });


        // Toggle animation on/off when user
        // clicks on the play button
        playButton.addEventListener("click", () => {
            playButton.iconStart === "pause" ? stopAnimation() : startAnimation();
        });
        // When the layerview is available, setup hovering interactivity
        viewElement.whenLayerView(layer).then(setupHoverTooltip);

        // Starts the application by visualizing year 1984
        setYear(1984);

        //--------------------------------------------------------------------------
        //  Methods
        //--------------------------------------------------------------------------

        /**
         * Sets the current year.
         */
        function setYear(value) {
            const year = Math.floor(value);
            sliderValue.textContent = year;
            slider.value = value;
            layer.renderer = createRenderer(year);
        }

        /**
         * Returns a renderer with a color visual variable driven by the input
         * year. The selected year will always render buildings built in that year
         * with a light blue color. Buildings built ______ 20+ ________ years before the indicated
         * year are visualized with a pink color. Buildings built within that
         * _______ 20-year time frame _____ are assigned a color interpolated between blue and pink.
         */
        function createRenderer(year) {
            return {
                type: "simple",
                symbol: { type: "simple-marker", color: "rgb(0, 0, 0)", size: 8, outline: null },
                visualVariables: [
                    {
                        type: "opacity",
                        field: YEAR_FIELD,
                        stops: [
                            { opacity: 1, value: year },
                            { opacity: 0, value: year + 1 },
                        ],
                        legendOptions: { showLegend: true },
                    },
                    // LEGEND - ONLY SHOWS WHEN YOUR DATA IS IN VIEW
                    {
                        type: "color",
                        field: YEAR_FIELD,
                        legendOptions: { title: "Events In:" },
                        stops: [
                            { value: year, color: "#0ff", label: `in ${year}` },
                            { value: year - 5, color: "#f0f", label: `in ${year - 10}` }, // CHANGE THE INTERVAL TO MAYBE 5 - 10 YEAR
                            { value: year - 15, color: "#404", label: `before ${year - 15}` },
                        ],
                    },
                ],
            };
        }


        /**
         * Starts the animation that cycle
         * through the construction years.
         */
        function startAnimation() {
            stopAnimation();
            animation = animate(Number(slider.value));
            playButton.iconStart = "pause";
            playButton.textContent = "Pause";
        }

        /**
         * Stops the animations
         */
        function stopAnimation() {
            if (animation) {
                animation.remove();
                animation = null;
            }
            playButton.iconStart = "play";
            playButton.textContent = "Play";
        }

        /**
         * Animates the color visual variable continously
         */
        function animate(startValue) {
            let animating = true;
            let value = startValue;

            const update = () => {
                if (!animating) return;
                value += 0.125; //ANIMATION SPEED HERE
                if (value > 2025) value = 1984;
                setYear(value);
                requestAnimationFrame(update);
            };

            requestAnimationFrame(update);

            return {
                remove: () => {
                    animating = false;
                },
            };
        }


        /**
         * Sets up a moving tooltip that displays
         * the construction year of the hovered building.
         */
        function setupHoverTooltip(layerView) {
            let highlight;
            const tooltip = createTooltip();

            const hitTest = promiseUtils.debounce((event) => {
                return viewElement.hitTest(event).then((hit) => {
                    const result = hit.results.find((r) => r.graphic.layer === layer);
                    return result ? { graphic: result.graphic, screenPoint: hit.screenPoint } : null;
                });
            });
            viewElement.addEventListener("arcgisViewPointerMove", async (event) => {
                try {
                    const hit = await hitTest(event.detail);
                    if (highlight) {
                        highlight.remove();
                        highlight = null;
                    }
                    if (hit) {
                        highlight = layerView.highlight(hit.graphic);
                        tooltip.show(hit.screenPoint, `Built in ${hit.graphic.getAttribute("CNSTRCT_YR")}`); // FIELD NAME FIELD NAME
                    } else {
                        tooltip.hide();
                    }
                } catch (error) {
                    if (error.name !== "AbortError") {
                        console.error("Unexpected hitTest error:", error);
                    }
                    // Ignore AbortError silently
                }
            });
        }

        /**
         * Creates a tooltip to display a the construction year of a building.
         */
        function createTooltip() {
            const tooltip = document.createElement("div");
            tooltip.className = "tooltip";
            tooltip.setAttribute("role", "tooltip");

            const text = document.createElement("div");
            tooltip.appendChild(text);

            viewElement.appendChild(tooltip);

            let x = 0,
                y = 0,
                targetX = 0,
                targetY = 0,
                visible = false;

            function move() {
                x += (targetX - x) * 0.1;
                y += (targetY - y) * 0.1;
                if (Math.abs(targetX - x) < 1 && Math.abs(targetY - y) < 1) {
                    x = targetX;
                    y = targetY;
                } else {
                    requestAnimationFrame(move);
                }
                tooltip.style.transform = `translate3d(${Math.round(x)}px,${Math.round(y)}px,0)`;
            }

            return {
                show: (pt, str) => {
                    if (!visible) [x, y] = [pt.x, pt.y];
                    [targetX, targetY] = [pt.x, pt.y];
                    tooltip.style.opacity = 1;
                    text.textContent = str;
                    visible = true;
                    move();
                },
                hide: () => {
                    tooltip.style.opacity = 0;
                    visible = false;
                },
            };
        }
    </script>
</body>

</html>
